search:
  opensearch:
    instanceCount: 2
enabled: true
endpoints:
  runray.xyz:
    hostname: "*.runray.xyz"
    port: 443
    protocol: HTTPS
    tls:
      externalSecretNames:
        - "liferay/certificates/runray.xyz"
license:
  externalSecretName: "liferay/licenses/developer-clustered"
  targetSecretName: "developer-clustered"
