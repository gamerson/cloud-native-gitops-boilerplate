liferay-default:
  replicaCount: 1
  network:
    enabled: true
    endpointRef: runray.xyz
    forceHttpsRedirect: true
    hostnames:
      - "liferay-able-dev.runray.xyz"
  overlay:
    copy:
      - from: "test-upload-1/osgi/client-extensions/*"
        into: "osgi/client-extensions/"
    enabled: true
  customEnv:
    x-liferay-valid-hosts:
      - name: LIFERAY_VIRTUAL_PERIOD_HOSTS_PERIOD_VALID_PERIOD_HOSTS
        value: "localhost, ${env.POD_ID}, liferay-able-dev.runray.xyz"
