liferay-default:
  network:
    enabled: true
    endpointRef: runray.xyz
    forceHttpsRedirect: true
    hostnames:
      - "able-dev.runray.xyz"
  overlay:
    bucketName: gma-bstest1-overlay-able-dev-766749
    copy:
      - from: "overlay_test_1/osgi/client-extensions/*"
        into: osgi/client-extensions
    enabled: true
  customInitContainers:
    x-liferay-overlay:
        -   containerTemplate: |
                -   command:
                        -   bash
                        -   -c
                        -   |
                            {{- if and .overlay .overlay.enabled }}
                            {{- $overlay := .overlay -}}
                            {{- range $overlay.copy }}
                            tree /mnt/liferay/overlay

                            mkdir \
                                --parents \
                                --verbose \
                                /temp/{{ .into }}

                            cp \
                                --recursive \
                                --verbose \
                                /mnt/liferay/overlay/{{ .from }} \
                                /temp/{{ .into }}
                            {{- end }}
                            {{- else }}
                            echo "Overlay is not enabled."
                            {{- end }}
                    image: {{ printf "%s:%s" .image.repository (.image.tag | toString) }}
                    imagePullPolicy: {{ .image.pullPolicy }}
                    name: liferay-overlay
                    {{- if and .overlay .overlay.enabled }}
                    volumeMounts:
                        -   mountPath: /mnt/liferay/overlay
                            name: {{ .overlay.bucketName }}
                        -   mountPath: /temp
                            name: liferay-persistent-volume
                    {{- end }}
 
