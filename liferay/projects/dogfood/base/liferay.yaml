liferay-default:
  customEnv:
    x-license:
      - name: LIFERAY_DISABLE_TRIAL_LICENSE
        value: "true"
  customInitContainers:
     x-fix-permissions:
        -   containerTemplate: |
                -   command:
                        -   bash
                        -   -c
                        -   |
                        -   chown -R liferay:liferay /temp
                    image: {{ printf "%s:%s" .image.repository (.image.tag | toString) }}
                    imagePullPolicy: {{ .image.pullPolicy }}
                    name: liferay-fix-permissions
                    securityContext:
                        allowPrivilegeEscalation: false
                        capabilities:
                            drop:
                                -   ALL
                        seccompProfile:
                            type: RuntimeDefault
                    volumeMounts:
                      -   mountPath: /temp
                          name: liferay-persistent-volume
  customVolumeMounts:
    x-license:
      - mountPath: /etc/liferay/mount/files/deploy
        name: developer-clustered
  customVolumes:
    x-license:
      - name: developer-clustered
        secret:
          items:
            - key: license.xml
              path: license.xml
          secretName: developer-clustered
  image:
    tag: 2025.q1.22-lts
