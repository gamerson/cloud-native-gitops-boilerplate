liferay-default:
  replicaCount: 1
  network:
    enabled: true
    endpointRef: runray.xyz
    forceHttpsRedirect: true
    hostnames:
      - "dogfood-prd.runray.xyz"
  overlay:
    enabled: true
    bucketName: gma-20260413-overlay-dogfood-prd-859902
    copy:
    - from: "overlay-build-1/osgi/*"
      into: "osgi/"
